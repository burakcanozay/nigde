<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Aşkın Parçaları | 💜🧩</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Outfit', sans-serif;
            background: #0d0d1a;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 20px 10px 40px;
            color: white;
            overflow-x: hidden;
        }

        .particles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
        .particle { position: absolute; font-size: 18px; animation: floatUp linear infinite; opacity: 0; }
        @keyframes floatUp {
            0%   { transform: translateY(100vh) scale(0.5); opacity: 0; }
            10%  { opacity: 0.6; }
            90%  { opacity: 0.3; }
            100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
        }

        .header { position: relative; z-index: 1; text-align: center; margin-bottom: 12px; }
        .header h1 {
            font-size: clamp(1.8rem, 5vw, 2.8rem);
            font-weight: 800;
            background: linear-gradient(135deg, #c084fc, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stats-board {
            position: relative; z-index: 1;
            display: flex; align-items: center; gap: 20px;
            margin-bottom: 12px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(192,132,252,0.2);
            padding: 10px 24px;
            border-radius: 16px;
            backdrop-filter: blur(10px);
        }
        .score-label { font-size: 0.85rem; color: #d8b4fe; }
        .score-value { font-size: 1.4rem; font-weight: 700; color: #f472b6; }

        .game-wrapper {
            position: relative; z-index: 1;
            display: flex; gap: 14px;
            align-items: flex-start;
        }

        .board-container {
            position: relative;
            padding: 8px;
            background: rgba(30,27,75,0.45);
            border: 2px solid rgba(192,132,252,0.35);
            border-radius: 14px;
            box-shadow: 0 0 50px rgba(139,92,246,0.25);
            backdrop-filter: blur(12px);
        }

        #tetrisCanvas { display: block; border-radius: 8px; }

        .side-panel {
            display: flex; flex-direction: column; gap: 10px;
        }
        .next-box {
            background: rgba(30,27,75,0.45);
            border: 1px solid rgba(192,132,252,0.25);
            border-radius: 14px;
            padding: 10px;
            backdrop-filter: blur(10px);
            text-align: center;
        }
        .next-box span { font-size: 0.8rem; color: #a78bfa; display: block; margin-bottom: 6px; }
        #tetrisNextCanvas { display: block; margin: 0 auto; }

        .notification-tetris {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.5rem; font-weight: 800;
            color: #f472b6;
            text-shadow: 0 0 20px rgba(244,114,182,0.8);
            opacity: 0; pointer-events: none;
            text-align: center; width: 100%;
            z-index: 10;
        }
        .notification-tetris.show { animation: popUpTetris 2.2s forwards; }
        @keyframes popUpTetris {
            0%   { opacity: 0; transform: translate(-50%,-30%) scale(0.8); }
            15%  { opacity: 1; transform: translate(-50%,-50%) scale(1.15); }
            75%  { opacity: 1; transform: translate(-50%,-50%) scale(1); }
            100% { opacity: 0; transform: translate(-50%,-70%) scale(0.9); }
        }

        .mobile-controls {
            position: relative; z-index: 1;
            display: grid;
            grid-template-areas:
                ". up ."
                "left down right"
                ". drop .";
            grid-template-columns: 60px 60px 60px;
            grid-template-rows: 50px 50px 50px;
            gap: 6px;
            margin-top: 14px;
        }
        .ctrl-btn {
            background: rgba(168,85,247,0.2);
            border: 1px solid rgba(192,132,252,0.4);
            color: white; font-size: 1.3rem;
            border-radius: 12px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.15s;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        .ctrl-btn:active { background: rgba(168,85,247,0.5); transform: scale(0.92); }
        .ctrl-up    { grid-area: up; }
        .ctrl-down  { grid-area: down; }
        .ctrl-left  { grid-area: left; }
        .ctrl-right { grid-area: right; }
        .ctrl-drop  { grid-area: drop; font-size: 0.75rem; }

        .game-over-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            z-index: 100;
            display: flex; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none;
            transition: opacity 0.5s ease;
        }
        .game-over-overlay.show { opacity: 1; pointer-events: all; }
        .modal-box {
            background: linear-gradient(135deg,#1e1b4b,#2d1b69);
            border: 1px solid rgba(192,132,252,0.4);
            border-radius: 28px;
            padding: 36px 44px; text-align: center;
            box-shadow: 0 30px 80px rgba(168,85,247,0.4);
            transform: scale(0.8);
            transition: transform 0.5s cubic-bezier(0.34,1.56,0.64,1);
            max-width: 380px; width: 90%;
        }
        .game-over-overlay.show .modal-box { transform: scale(1); }
        .modal-emoji { font-size: 3.5rem; margin-bottom: 12px; display: block; }
        .modal-title { font-size: 1.6rem; color: #e2e8f0; margin-bottom: 8px; }
        .modal-score { font-size: 1.3rem; color: #f472b6; font-weight: 700; margin-bottom: 22px; }

        .btn {
            background: linear-gradient(135deg,#a855f7,#ec4899);
            color: white; border: none;
            padding: 12px 28px; border-radius: 50px;
            font-family: 'Outfit', sans-serif;
            font-size: 1rem; font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(168,85,247,0.4);
            transition: transform 0.2s;
            text-decoration: none; display: inline-block;
        }
        .btn:hover { transform: translateY(-2px); }
        .btn-secondary {
            background: rgba(255,255,255,0.06);
            box-shadow: none;
            border: 1px solid rgba(255,255,255,0.1);
            margin-top: 12px;
        }
        .btn-secondary:hover { background: rgba(255,255,255,0.12); }
        .bottom-nav { position: relative; z-index: 1; margin-top: 16px; }

        .start-overlay {
            position: absolute; inset: 0;
            background: rgba(13,13,26,0.7);
            backdrop-filter: blur(4px);
            border-radius: 8px;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 5; cursor: pointer;
        }
        .start-overlay.hidden { display: none; }
        .start-overlay span { font-size: 1.2rem; color: #f472b6; font-weight: 700; }
        .start-overlay small { color: #a78bfa; margin-top: 6px; font-size: 0.85rem; }

        @keyframes neonPulse {
            0%, 100% { box-shadow: 0 0 8px rgba(192,132,252,0.4); }
            50% { box-shadow: 0 0 18px rgba(192,132,252,0.7), 0 0 30px rgba(168,85,247,0.3); }
        }
    </style>
</head>
<body>
    <div class="particles" id="tetrisParticles"></div>

    <div class="header"><h1>Aşkın Parçaları 💜🧩</h1></div>

    <div class="stats-board">
        <div>
            <div class="score-label">Birlikte İnşa Edilen Mutluluk</div>
            <div class="score-value" id="tetrisScore">0</div>
        </div>
    </div>

    <div class="game-wrapper">
        <div class="board-container" id="tetrisBoardContainer">
            <canvas id="tetrisCanvas" width="250" height="500"></canvas>
            <div class="notification-tetris" id="tetrisNotification">Anılar birikiyor! 💕</div>
            <div class="start-overlay" id="tetrisStartOverlay" onclick="startTetrisGame()">
                <span>🧩 Başlamak için tıkla!</span>
                <small>veya bir tuşa bas</small>
            </div>
        </div>
        <div class="side-panel">
            <div class="next-box">
                <span>Sonraki</span>
                <canvas id="tetrisNextCanvas" width="100" height="100"></canvas>
            </div>
        </div>
    </div>

    <div class="mobile-controls">
        <button class="ctrl-btn ctrl-up" ontouchstart="tetrisRotate()" onclick="tetrisRotate()">🔄</button>
        <button class="ctrl-btn ctrl-left" ontouchstart="tetrisMoveLeft()" onclick="tetrisMoveLeft()">⬅️</button>
        <button class="ctrl-btn ctrl-down" ontouchstart="tetrisMoveDown()" onclick="tetrisMoveDown()">⬇️</button>
        <button class="ctrl-btn ctrl-right" ontouchstart="tetrisMoveRight()" onclick="tetrisMoveRight()">➡️</button>
        <button class="ctrl-btn ctrl-drop" ontouchstart="tetrisHardDrop()" onclick="tetrisHardDrop()">⏬</button>
    </div>

    <div class="bottom-nav">
        <a href="oyunlar.html" class="btn btn-secondary">🏠 Oyunlara Dön</a>
    </div>

    <div class="game-over-overlay" id="tetrisGameOverOverlay">
        <div class="modal-box">
            <span class="modal-emoji">💜</span>
            <div class="modal-title">Aşkımız hep büyüyecek!</div>
            <div class="modal-score">Mutluluk Puanı: <span id="tetrisFinalScore">0</span></div>
            <button class="btn" onclick="tetrisRestart()">Tekrar Oyna 🔄</button>
        </div>
    </div>

    <script>
    (function() {
        // ─── CANVAS & DOM ───
        const canvas = document.getElementById('tetrisCanvas');
        const ctx = canvas.getContext('2d');
        const nextCanvas = document.getElementById('tetrisNextCanvas');
        const nextCtx = nextCanvas.getContext('2d');
        const scoreEl = document.getElementById('tetrisScore');
        const notifEl = document.getElementById('tetrisNotification');
        const overlayEl = document.getElementById('tetrisGameOverOverlay');
        const finalScoreEl = document.getElementById('tetrisFinalScore');
        const startOverlay = document.getElementById('tetrisStartOverlay');

        // ─── BOARD SETTINGS ───
        const COLS = 10;
        const ROWS = 20;
        const BLOCK = canvas.width / COLS; // 25px
        const COLORS = ['#8e44ad', '#e0c3fc', '#764ba2', '#a855f7', '#c084fc', '#9b59b6', '#d8b4fe'];
        const HEART_COLOR = '#f472b6';

        // ─── TETROMINOES ───
        const SHAPES = [
            [[1,1,1,1]],                         // I
            [[1,1],[1,1]],                        // O
            [[0,1,0],[1,1,1]],                    // T
            [[1,0,0],[1,1,1]],                    // L
            [[0,0,1],[1,1,1]],                    // J
            [[0,1,1],[1,1,0]],                    // S
            [[1,1,0],[0,1,1]]                     // Z
        ];

        let board = [];
        let score = 0;
        let gameOver = false;
        let started = false;
        let dropInterval = 800;
        let lastDrop = 0;
        let currentPiece = null;
        let nextPiece = null;
        let animFrameId = null;

        // ─── PIECE CLASS ───
        function createPiece(shapeIdx, isHeart) {
            if (isHeart) {
                return {
                    shape: [[1]],
                    color: HEART_COLOR,
                    isHeart: true,
                    x: Math.floor(COLS / 2),
                    y: 0
                };
            }
            const shape = SHAPES[shapeIdx].map(r => [...r]);
            return {
                shape: shape,
                color: COLORS[shapeIdx % COLORS.length],
                isHeart: false,
                x: Math.floor(COLS / 2) - Math.floor(shape[0].length / 2),
                y: 0
            };
        }

        function randomPiece() {
            if (Math.random() < 0.08) return createPiece(0, true);
            return createPiece(Math.floor(Math.random() * SHAPES.length), false);
        }

        // ─── BOARD ───
        function initBoard() {
            board = [];
            for (let r = 0; r < ROWS; r++) {
                board.push(new Array(COLS).fill(0));
            }
        }

        function collides(piece, offX, offY, shape) {
            shape = shape || piece.shape;
            for (let r = 0; r < shape.length; r++) {
                for (let c = 0; c < shape[r].length; c++) {
                    if (!shape[r][c]) continue;
                    let nx = piece.x + c + offX;
                    let ny = piece.y + r + offY;
                    if (nx < 0 || nx >= COLS || ny >= ROWS) return true;
                    if (ny >= 0 && board[ny][nx]) return true;
                }
            }
            return false;
        }

        function lockPiece() {
            const p = currentPiece;
            if (p.isHeart) {
                // Heart clears surrounding blocks in a 3x3 area
                let cx = p.x, cy = p.y;
                for (let r = cy - 1; r <= cy + 1; r++) {
                    for (let c = cx - 1; c <= cx + 1; c++) {
                        if (r >= 0 && r < ROWS && c >= 0 && c < COLS) {
                            board[r][c] = 0;
                        }
                    }
                }
                showNotification('💖 Kalp temizledi!');
                score += 5;
                scoreEl.textContent = score;
            } else {
                for (let r = 0; r < p.shape.length; r++) {
                    for (let c = 0; c < p.shape[r].length; c++) {
                        if (!p.shape[r][c]) continue;
                        let ny = p.y + r;
                        let nx = p.x + c;
                        if (ny < 0) { endGame(); return; }
                        board[ny][nx] = p.color;
                    }
                }
            }
            clearLines();
            spawnNext();
        }

        function clearLines() {
            let cleared = 0;
            for (let r = ROWS - 1; r >= 0; r--) {
                if (board[r].every(c => c !== 0)) {
                    board.splice(r, 1);
                    board.unshift(new Array(COLS).fill(0));
                    cleared++;
                    r++;
                }
            }
            if (cleared > 0) {
                let pts = cleared * 100 * cleared;
                score += pts;
                scoreEl.textContent = score;
                showNotification('Anılar birikiyor! 💕');
                if (dropInterval > 250) dropInterval -= cleared * 15;
            }
        }

        function spawnNext() {
            currentPiece = nextPiece || randomPiece();
            nextPiece = randomPiece();
            if (collides(currentPiece, 0, 0)) {
                endGame();
            }
            drawNext();
        }

        // ─── DRAWING ───
        function drawBlock(context, x, y, color, size, isHeart) {
            if (isHeart) {
                context.font = (size * 0.85) + 'px Arial';
                context.textAlign = 'center';
                context.textBaseline = 'middle';
                context.shadowColor = '#ff6b9d';
                context.shadowBlur = 14;
                context.fillText('❤️', x + size / 2, y + size / 2 + 1);
                context.shadowBlur = 0;
                return;
            }
            // Neon block
            const grad = context.createLinearGradient(x, y, x + size, y + size);
            grad.addColorStop(0, color);
            grad.addColorStop(1, shadeColor(color, -25));
            context.fillStyle = grad;
            context.shadowColor = color;
            context.shadowBlur = 8;
            context.beginPath();
            context.roundRect(x + 1, y + 1, size - 2, size - 2, 4);
            context.fill();
            context.shadowBlur = 0;
            // Inner highlight
            context.fillStyle = 'rgba(255,255,255,0.15)';
            context.fillRect(x + 3, y + 3, size - 6, 3);
        }

        function shadeColor(col, amt) {
            let num = parseInt(col.slice(1), 16);
            let r = Math.min(255, Math.max(0, (num >> 16) + amt));
            let g = Math.min(255, Math.max(0, ((num >> 8) & 0xff) + amt));
            let b = Math.min(255, Math.max(0, (num & 0xff) + amt));
            return '#' + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1);
        }

        function drawBoard() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            // Grid
            ctx.strokeStyle = 'rgba(192,132,252,0.08)';
            ctx.lineWidth = 0.5;
            for (let r = 0; r <= ROWS; r++) {
                ctx.beginPath(); ctx.moveTo(0, r * BLOCK); ctx.lineTo(canvas.width, r * BLOCK); ctx.stroke();
            }
            for (let c = 0; c <= COLS; c++) {
                ctx.beginPath(); ctx.moveTo(c * BLOCK, 0); ctx.lineTo(c * BLOCK, canvas.height); ctx.stroke();
            }
            // Locked blocks
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    if (board[r][c]) {
                        drawBlock(ctx, c * BLOCK, r * BLOCK, board[r][c], BLOCK, false);
                    }
                }
            }
            // Ghost piece
            if (currentPiece && !currentPiece.isHeart) {
                let ghostY = currentPiece.y;
                while (!collides(currentPiece, 0, ghostY - currentPiece.y + 1)) ghostY++;
                ctx.globalAlpha = 0.18;
                for (let r = 0; r < currentPiece.shape.length; r++) {
                    for (let c = 0; c < currentPiece.shape[r].length; c++) {
                        if (currentPiece.shape[r][c]) {
                            drawBlock(ctx, (currentPiece.x + c) * BLOCK, (ghostY + r) * BLOCK, currentPiece.color, BLOCK, false);
                        }
                    }
                }
                ctx.globalAlpha = 1;
            }
            // Current piece
            if (currentPiece) {
                for (let r = 0; r < currentPiece.shape.length; r++) {
                    for (let c = 0; c < currentPiece.shape[r].length; c++) {
                        if (currentPiece.shape[r][c]) {
                            drawBlock(ctx, (currentPiece.x + c) * BLOCK, (currentPiece.y + r) * BLOCK, currentPiece.color, BLOCK, currentPiece.isHeart);
                        }
                    }
                }
            }
        }

        function drawNext() {
            nextCtx.clearRect(0, 0, nextCanvas.width, nextCanvas.height);
            if (!nextPiece) return;
            const s = nextPiece.shape;
            const bSize = 22;
            const ox = (nextCanvas.width - s[0].length * bSize) / 2;
            const oy = (nextCanvas.height - s.length * bSize) / 2;
            for (let r = 0; r < s.length; r++) {
                for (let c = 0; c < s[r].length; c++) {
                    if (s[r][c]) {
                        drawBlock(nextCtx, ox + c * bSize, oy + r * bSize, nextPiece.color, bSize, nextPiece.isHeart);
                    }
                }
            }
        }

        // ─── CONTROLS ───
        function rotate(shape) {
            const rows = shape.length, cols = shape[0].length;
            const rotated = [];
            for (let c = 0; c < cols; c++) {
                rotated.push([]);
                for (let r = rows - 1; r >= 0; r--) {
                    rotated[c].push(shape[r][c]);
                }
            }
            return rotated;
        }

        window.tetrisRotate = function() {
            if (!currentPiece || gameOver || !started) return;
            if (currentPiece.isHeart) return;
            const rotated = rotate(currentPiece.shape);
            if (!collides(currentPiece, 0, 0, rotated)) {
                currentPiece.shape = rotated;
            } else if (!collides(currentPiece, 1, 0, rotated)) {
                currentPiece.x += 1; currentPiece.shape = rotated;
            } else if (!collides(currentPiece, -1, 0, rotated)) {
                currentPiece.x -= 1; currentPiece.shape = rotated;
            }
        };
        window.tetrisMoveLeft = function() {
            if (!currentPiece || gameOver || !started) return;
            if (!collides(currentPiece, -1, 0)) currentPiece.x--;
        };
        window.tetrisMoveRight = function() {
            if (!currentPiece || gameOver || !started) return;
            if (!collides(currentPiece, 1, 0)) currentPiece.x++;
        };
        window.tetrisMoveDown = function() {
            if (!currentPiece || gameOver || !started) return;
            if (!collides(currentPiece, 0, 1)) {
                currentPiece.y++;
            } else {
                lockPiece();
            }
        };
        window.tetrisHardDrop = function() {
            if (!currentPiece || gameOver || !started) return;
            while (!collides(currentPiece, 0, 1)) currentPiece.y++;
            lockPiece();
        };

        // ─── KEYBOARD ───
        document.addEventListener('keydown', function(e) {
            if (gameOver) return;
            if ([37,38,39,40,32].includes(e.keyCode)) e.preventDefault();
            if (!started) {
                if ([37,38,39,40,32,65,87,68,83].includes(e.keyCode)) {
                    startTetrisGame();
                }
                return;
            }
            switch(e.keyCode) {
                case 37: case 65: tetrisMoveLeft(); break;
                case 39: case 68: tetrisMoveRight(); break;
                case 40: case 83: tetrisMoveDown(); break;
                case 38: case 87: tetrisRotate(); break;
                case 32: tetrisHardDrop(); break;
            }
        });

        // ─── GAME LOOP ───
        function gameLoop(time) {
            if (gameOver) return;
            animFrameId = requestAnimationFrame(gameLoop);
            if (!started) return;
            if (time - lastDrop > dropInterval) {
                lastDrop = time;
                if (!collides(currentPiece, 0, 1)) {
                    currentPiece.y++;
                } else {
                    lockPiece();
                }
            }
            drawBoard();
        }

        // ─── NOTIFICATIONS ───
        function showNotification(text) {
            notifEl.textContent = text;
            notifEl.classList.remove('show');
            void notifEl.offsetWidth;
            notifEl.classList.add('show');
        }

        // ─── GAME STATE ───
        function endGame() {
            gameOver = true;
            finalScoreEl.textContent = score;
            overlayEl.classList.add('show');
        }

        window.startTetrisGame = function() {
            if (started) return;
            started = true;
            startOverlay.classList.add('hidden');
            spawnNext();
            lastDrop = performance.now();
        };

        window.tetrisRestart = function() {
            overlayEl.classList.remove('show');
            gameOver = false;
            started = false;
            score = 0;
            dropInterval = 800;
            scoreEl.textContent = '0';
            initBoard();
            currentPiece = null;
            nextPiece = null;
            startOverlay.classList.remove('hidden');
            drawBoard();
            drawNext();
            if (animFrameId) cancelAnimationFrame(animFrameId);
            animFrameId = requestAnimationFrame(gameLoop);
        };

        // ─── PARTICLES ───
        (function createParticles() {
            const container = document.getElementById('tetrisParticles');
            const emojis = ['💜','✨','💕','🧩','💫','🔮'];
            for (let i = 0; i < 15; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.textContent = emojis[Math.floor(Math.random() * emojis.length)];
                p.style.left = Math.random() * 100 + 'vw';
                p.style.animationDuration = (5 + Math.random() * 6) + 's';
                p.style.animationDelay = (Math.random() * 5) + 's';
                p.style.fontSize = (14 + Math.random() * 12) + 'px';
                container.appendChild(p);
            }
        })();

        // ─── INIT ───
        initBoard();
        drawBoard();
        animFrameId = requestAnimationFrame(gameLoop);
    })();
    </script>
</body>
</html>
